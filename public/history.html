<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080810">
<title>История расходов</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
<style>
  /* ── FILTERS ── */
  .filters { padding:0 20px 0; display:flex; flex-direction:column; gap:8px; }
  .filter-row { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-pill {
    flex-shrink:0; padding:7px 14px; border-radius:20px; border:1px solid var(--border);
    background:var(--bg3); color:var(--text2); font-size:12px; font-weight:600;
    cursor:pointer; transition:all 0.15s; white-space:nowrap; font-family:var(--sans);
  }
  .filter-pill.active { background:var(--green-dim); border-color:rgba(0,232,122,0.4); color:var(--green); }
  .filter-pill:hover { border-color:var(--border2); }
  .filter-select {
    flex-shrink:0; background:var(--bg3); border:1px solid var(--border);
    border-radius:20px; padding:7px 14px; font-size:12px; font-weight:600;
    font-family:var(--sans); color:var(--text2); outline:none; cursor:pointer;
    transition:border-color 0.2s; color-scheme:inherit;
  }
  .filter-select:focus { border-color:var(--border2); }

  /* ── STATS CARD ── */
  .stats-card {
    margin:0 20px; background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:16px;
  }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .stat-item { }
  .stat-label { font-size:10px; color:var(--text3); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:4px; }
  .stat-value { font-family:var(--mono); font-size:16px; font-weight:700; color:var(--text); }
  .stat-value.danger { color:var(--red); }
  .stat-value.warn   { color:var(--yellow); }
  .stats-divider { height:1px; background:var(--border); margin:12px 0; }
  .stats-regret {
    display:flex; justify-content:space-between; align-items:center;
    font-size:12px; color:var(--text2);
  }
  .stats-regret .val { font-family:var(--mono); font-weight:700; }

  /* ── EXPORT ── */
  .export-section { padding:0 20px; }
  .export-date-row {
    display:flex; gap:8px; margin-bottom:8px; align-items:center;
  }
  .export-date-row label { font-size:11px; color:var(--text3); font-weight:600; white-space:nowrap; }
  .export-date-input {
    flex:1; background:var(--bg3); border:1px solid var(--border);
    border-radius:10px; padding:8px 12px; font-size:13px;
    font-family:var(--mono); color:var(--text); outline:none;
    transition:border-color 0.2s; color-scheme:inherit;
  }
  .export-date-input:focus { border-color:var(--border2); }
  .export-btn {
    width:100%; padding:13px; background:var(--bg3); border:1px solid var(--border);
    border-radius:12px; color:var(--text); font-size:14px; font-weight:700;
    font-family:var(--sans); cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .export-btn:hover { border-color:var(--border2); background:var(--card); }
  .export-btn:active { transform:scale(0.98); }
  .export-hint { font-size:11px; color:var(--text3); text-align:center; margin-top:6px; }

  /* ── EXPENSE LIST ── */
  .expense-groups { padding:0 20px; display:flex; flex-direction:column; gap:0; }
  .day-group { margin-bottom:16px; }
  .day-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:8px;
  }
  .day-date { font-size:12px; font-weight:700; color:var(--text2); }
  .day-total { font-family:var(--mono); font-size:12px; color:var(--text3); }
  .day-items { display:flex; flex-direction:column; gap:6px; }

  /* Swipe-to-delete container */
  .swipe-wrap { position:relative; overflow:hidden; border-radius:12px; }
  .swipe-inner { transition:transform 0.25s ease; position:relative; z-index:1; background:var(--card); border-radius:12px; }
  .delete-reveal {
    position:absolute; right:0; top:0; bottom:0; width:72px;
    background:var(--red); display:flex; align-items:center; justify-content:center;
    border-radius:0 12px 12px 0; cursor:pointer; font-size:18px;
  }
  .swipe-inner .expense-row { border-radius:12px; cursor:pointer; }
  .swipe-inner:active .expense-row { background:var(--bg3); }

  /* ── EMPTY ── */
  .empty-state {
    padding:48px 20px; text-align:center; color:var(--text3); font-size:13px; line-height:1.8;
  }

  /* ── EDIT MODAL ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100;
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.2s;
  }
  .modal-overlay.open { opacity:1; pointer-events:auto; }
  .modal-sheet {
    background:var(--bg2); border-radius:20px 20px 0 0; width:100%; max-width:480px;
    padding:20px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
    transform:translateY(100%); transition:transform 0.25s ease;
    max-height:85vh; overflow-y:auto;
  }
  .modal-overlay.open .modal-sheet { transform:translateY(0); }
  .modal-handle {
    width:36px; height:4px; border-radius:2px; background:var(--border2);
    margin:0 auto 16px;
  }
  .modal-title {
    font-size:16px; font-weight:700; color:var(--text); margin-bottom:16px;
    text-align:center;
  }
  .modal-field { margin-bottom:14px; }
  .modal-label {
    font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase;
    letter-spacing:0.05em; margin-bottom:6px;
  }
  .modal-input {
    width:100%; background:var(--bg3); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px; font-size:14px;
    font-family:var(--sans); color:var(--text); outline:none;
    transition:border-color 0.2s; box-sizing:border-box;
  }
  .modal-input:focus { border-color:var(--border2); }
  .modal-input[type="number"],
  .modal-input[type="date"] { font-family:var(--mono); color-scheme:inherit; }
  .modal-cat-select {
    width:100%; background:var(--bg3); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px; font-size:14px;
    font-family:var(--sans); color:var(--text); outline:none;
    transition:border-color 0.2s; color-scheme:inherit; box-sizing:border-box;
  }
  .modal-regret-row { display:flex; gap:6px; }
  .modal-regret-btn {
    flex:1; padding:10px 4px; border-radius:10px; border:1px solid var(--border);
    background:var(--bg3); cursor:pointer; transition:all 0.15s;
    font-family:var(--mono); font-size:14px; font-weight:700; color:var(--text2);
    text-align:center;
  }
  .modal-regret-btn.sel { border-color:rgba(255,255,255,0.2); }
  .modal-regret-btn[data-s="0"].sel { background:rgba(0,232,122,0.14);  border-color:var(--green); color:var(--green); }
  .modal-regret-btn[data-s="1"].sel { background:rgba(0,200,100,0.11);  border-color:#00c864; color:#00c864; }
  .modal-regret-btn[data-s="2"].sel { background:rgba(245,200,66,0.11); border-color:var(--yellow); color:var(--yellow); }
  .modal-regret-btn[data-s="3"].sel { background:rgba(255,160,50,0.11); border-color:#ffa032; color:#ffa032; }
  .modal-regret-btn[data-s="4"].sel { background:rgba(255,100,60,0.11); border-color:#ff643c; color:#ff643c; }
  .modal-regret-btn[data-s="5"].sel { background:rgba(255,60,80,0.14);  border-color:var(--red); color:var(--red); }
  .modal-actions { display:flex; gap:10px; margin-top:18px; }
  .modal-btn {
    flex:1; padding:14px; border-radius:14px; font-size:14px;
    font-weight:700; font-family:var(--sans); cursor:pointer; transition:all 0.15s;
    border:none; text-align:center;
  }
  .modal-btn-save { background:var(--green); color:#000; }
  .modal-btn-save:active { transform:scale(0.97); }
  .modal-btn-delete { background:rgba(255,77,106,0.12); color:var(--red); border:1px solid rgba(255,77,106,0.25); }
  .modal-btn-delete:active { transform:scale(0.97); }

  @media (min-width:768px) {
    .modal-overlay { align-items:center; }
    .modal-sheet { border-radius:20px; max-width:420px; transform:translateY(20px) scale(0.97); opacity:0; }
    .modal-overlay.open .modal-sheet { transform:translateY(0) scale(1); opacity:1; }
  }

</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <div class="page-header s1">
    <a class="page-back" href="index.html">←</a>
    <div class="page-title">История</div>
  </div>

  <!-- FILTERS -->
  <div class="filters s1">
    <div class="filter-row" id="periodFilter">
      <button class="filter-pill active" data-period="month" onclick="setPeriod('month')">Этот месяц</button>
      <button class="filter-pill" data-period="week"  onclick="setPeriod('week')">Неделя</button>
      <button class="filter-pill" data-period="prev"  onclick="setPeriod('prev')">Прошлый мес.</button>
      <button class="filter-pill" data-period="all"   onclick="setPeriod('all')">Всё время</button>
    </div>
    <div class="filter-row">
      <select class="filter-select" id="catFilter" onchange="applyFilters()">
        <option value="">Все категории</option>
      </select>
      <select class="filter-select" id="sortFilter" onchange="applyFilters()">
        <option value="date">По дате</option>
        <option value="amount">По сумме</option>
        <option value="regret">По сомнению</option>
      </select>
    </div>
  </div>

  <!-- STATS -->
  <div class="section-title s2">Статистика за период</div>
  <div class="stats-card s2" id="statsCard">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="stats-divider"></div>
    <div class="stats-regret" id="statsRegret"></div>
  </div>

  <!-- EXPORT -->
  <div class="section-title s3">Экспорт</div>
  <div class="export-section s3">
    <div class="export-date-row">
      <label>С</label>
      <input type="date" class="export-date-input" id="exportFrom" onchange="syncExportDates()">
      <label>По</label>
      <input type="date" class="export-date-input" id="exportTo" onchange="syncExportDates()">
    </div>
    <button class="export-btn" onclick="doExport()">📤 Экспортировать CSV</button>
    <div class="export-hint">Даты берутся из фильтра выше или выбери вручную</div>
  </div>

  <!-- EXPENSE LIST -->
  <div class="section-title s4">Расходы</div>
  <div class="expense-groups s4" id="expenseGroups"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Редактировать расход</div>
    <input type="hidden" id="editId">
    <div class="modal-field">
      <div class="modal-label">Сумма</div>
      <input type="number" class="modal-input" id="editAmount" inputmode="numeric" min="1">
    </div>
    <div class="modal-field">
      <div class="modal-label">Категория</div>
      <select class="modal-cat-select" id="editCat"></select>
    </div>
    <div class="modal-field">
      <div class="modal-label">Описание</div>
      <input type="text" class="modal-input" id="editDesc" placeholder="Необязательно">
    </div>
    <div class="modal-field">
      <div class="modal-label">Дата</div>
      <input type="date" class="modal-input" id="editDate">
    </div>
    <div class="modal-field">
      <div class="modal-label">Оценка сомнения</div>
      <div class="modal-regret-row" id="editRegretRow">
        <button class="modal-regret-btn" data-s="0" onclick="setEditRegret(0)">0</button>
        <button class="modal-regret-btn" data-s="1" onclick="setEditRegret(1)">1</button>
        <button class="modal-regret-btn" data-s="2" onclick="setEditRegret(2)">2</button>
        <button class="modal-regret-btn" data-s="3" onclick="setEditRegret(3)">3</button>
        <button class="modal-regret-btn" data-s="4" onclick="setEditRegret(4)">4</button>
        <button class="modal-regret-btn" data-s="5" onclick="setEditRegret(5)">5</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-delete" onclick="modalDelete()">Удалить</button>
      <button class="modal-btn modal-btn-save" onclick="modalSave()">Сохранить</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="nav-item" href="index.html">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Главная</span>
    </a>
    <a class="nav-item active" href="history.html">
      <span class="nav-icon">📋</span>
      <span class="nav-label">История</span>
    </a>
    <a class="nav-add" href="add.html">＋</a>
    <a class="nav-item" href="charts.html">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Детализация</span>
    </a>
    <a class="nav-item" href="settings.html">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Настройки</span>
    </a>
  </div>
</nav>


<script src="js/app.js"></script>
<script>
let currentPeriod = 'month';
let currentFrom   = null;
let currentTo     = null;

async function init() {
  await loadBudgetConfig();
  await initStorage();
  fillCatFilter();

  // Pre-select category from URL param (?cat=food_out)
  const params = new URLSearchParams(window.location.search);
  const catParam = params.get('cat');
  if (catParam) {
    document.getElementById('catFilter').value = catParam;
  }

  setPeriod('month');

  if (window.location.hash === '#export') {
    setTimeout(doExport, 300);
  }
}

function fillCatFilter() {
  const config = getBudgetConfig();
  if (!config) return;
  const sel      = document.getElementById('catFilter');
  const variable = config.categories.filter(c => !c.fixed);
  const fixed    = config.categories.filter(c => c.fixed);

  const varGroup = document.createElement('optgroup');
  varGroup.label = 'Переменные';
  variable.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = cat.emoji + ' ' + cat.name;
    varGroup.appendChild(opt);
  });
  sel.appendChild(varGroup);

  if (fixed.length > 0) {
    const fixGroup = document.createElement('optgroup');
    fixGroup.label = 'Фиксированные';
    fixed.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat.id;
      opt.textContent = cat.emoji + ' ' + cat.name;
      fixGroup.appendChild(opt);
    });
    sel.appendChild(fixGroup);
  }
}

function setPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.period === period);
  });
  const now = new Date();
  if (period === 'month') {
    currentFrom = getMonthPrefix() + '-01';
    currentTo   = getToday();
  } else if (period === 'week') {
    const d = new Date(now);
    d.setDate(d.getDate() - 6);
    currentFrom = d.toISOString().split('T')[0];
    currentTo   = getToday();
  } else if (period === 'prev') {
    const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const last = new Date(now.getFullYear(), now.getMonth(), 0);
    currentFrom = prev.toISOString().split('T')[0];
    currentTo   = last.toISOString().split('T')[0];
  } else {
    currentFrom = null;
    currentTo   = null;
  }
  // Sync export date inputs with period
  const fromEl = document.getElementById('exportFrom');
  const toEl   = document.getElementById('exportTo');
  if (fromEl) fromEl.value = currentFrom || '';
  if (toEl)   toEl.value   = currentTo   || '';
  applyFilters();
}

function syncExportDates() {
  // When user manually changes export dates, deselect period pills
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  currentPeriod = 'custom';
  currentFrom = document.getElementById('exportFrom').value || null;
  currentTo   = document.getElementById('exportTo').value   || null;
  applyFilters();
}

function applyFilters() {
  const config   = getBudgetConfig();
  const catId    = document.getElementById('catFilter').value;
  const sortMode = document.getElementById('sortFilter').value;

  let expenses = getExpenses(currentFrom, currentTo);
  if (catId) expenses = expenses.filter(e => e.category_id === catId);

  if (sortMode === 'amount') {
    expenses.sort((a,b) => b.amount - a.amount);
  } else if (sortMode === 'regret') {
    expenses.sort((a,b) => b.regret_score - a.regret_score || new Date(b.date) - new Date(a.date));
  } else {
    expenses.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  }

  renderStats(config, expenses);
  renderList(config, expenses, sortMode);
}

function renderStats(config, expenses) {
  const total     = expenses.reduce((s,e) => s+e.amount, 0);
  const days      = new Set(expenses.map(e => e.date)).size || 1;
  const avgDay    = total / days;
  const byCat     = {};
  expenses.forEach(e => { byCat[e.category_id] = (byCat[e.category_id] || 0) + e.amount; });
  const topCatId  = Object.entries(byCat).sort((a,b) => b[1]-a[1])[0];
  const topCat    = topCatId ? config?.categories.find(c => c.id === topCatId[0]) : null;
  const avgRegret = expenses.length
    ? expenses.reduce((s,e) => s+e.regret_score,0) / expenses.length : 0;
  const sombres   = expenses.filter(e => e.regret_score >= 4);
  const sombreSum = sombres.reduce((s,e) => s+e.amount,0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-item">
      <div class="stat-label">Потрачено</div>
      <div class="stat-value">${fmtRub(total)}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Ср. в день</div>
      <div class="stat-value">${fmtRub(avgDay)}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Топ категория</div>
      <div class="stat-value" style="font-size:13px">${topCat ? topCat.emoji + ' ' + topCat.name : '—'}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Транзакций</div>
      <div class="stat-value">${expenses.length}</div>
    </div>`;

  const regretCls = avgRegret > 2.5 ? 'danger' : '';
  document.getElementById('statsRegret').innerHTML = `
    <span>Ср. оценка сомнения</span>
    <span class="val ${regretCls}">${avgRegret.toFixed(1)} / 5</span>
    ${sombres.length > 0 ? `<span style="color:var(--text3);margin-left:8px">· ${sombres.length} сомн. на ${fmtRub(sombreSum)}</span>` : ''}`;
}

function renderList(config, expenses, sortMode) {
  const groups = document.getElementById('expenseGroups');
  if (expenses.length === 0) {
    groups.innerHTML = `<div class="empty-state">Нет расходов за выбранный период</div>`;
    return;
  }

  if (sortMode !== 'date') {
    // Flat list without grouping
    groups.innerHTML = expenses.map(e => renderExpenseRow(config, e)).join('');
    attachSwipe();
    return;
  }

  // Group by date
  const byDate = {};
  expenses.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });
  const sortedDates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));

  groups.innerHTML = sortedDates.map(date => {
    const dayExp   = byDate[date];
    const dayTotal = dayExp.reduce((s,e) => s+e.amount, 0);
    const dateObj  = new Date(date + 'T12:00:00');
    const dateStr  = dateObj.toLocaleDateString('ru', { weekday:'short', day:'numeric', month:'long' });
    return `
      <div class="day-group">
        <div class="day-header">
          <span class="day-date">${dateStr.replace(/^./, c=>c.toUpperCase())}</span>
          <span class="day-total">${fmtRub(dayTotal)}</span>
        </div>
        <div class="day-items">
          ${dayExp.map(e => renderExpenseRow(config, e)).join('')}
        </div>
      </div>`;
  }).join('');

  attachSwipe();
}

function renderExpenseRow(config, e) {
  const cat  = config?.categories.find(c => c.id === e.category_id) || { emoji:'❓', name: e.category_id };
  const dots = Array.from({length:5}, (_, idx) => {
    const filled = idx < e.regret_score;
    const mild   = e.regret_score <= 2;
    return `<span class="regret-dot ${filled ? 'filled' + (mild?' mild':'') : ''}"></span>`;
  }).join('');
  const dateObj = new Date(e.date + 'T12:00:00');
  const dateStr = dateObj.toLocaleDateString('ru', { day:'2-digit', month:'2-digit' });

  return `
    <div class="swipe-wrap" data-id="${e.id}">
      <div class="swipe-inner" data-eid="${e.id}">
        <div class="expense-row">
          <div class="expense-emoji">${cat.emoji}</div>
          <div class="expense-info">
            <div class="expense-desc">${e.description || cat.name}</div>
            <div class="expense-meta">${dateStr} · ${cat.name}</div>
          </div>
          <div class="expense-right">
            <div class="expense-amount">−${e.amount.toLocaleString('ru')}&nbsp;₽</div>
            <div class="regret-dots">${dots}</div>
          </div>
        </div>
      </div>
      <div class="delete-reveal" onclick="confirmDelete(${e.id})">🗑</div>
    </div>`;
}

// ── SWIPE TO DELETE ────────────────────────────────────────────────
function attachSwipe() {
  document.querySelectorAll('.swipe-wrap').forEach(wrap => {
    let startX = 0, dx = 0;
    const inner = wrap.querySelector('.swipe-inner');
    wrap.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      dx = 0;
      inner.style.transition = 'none';
    }, { passive:true });
    wrap.addEventListener('touchmove', e => {
      dx = e.touches[0].clientX - startX;
      if (dx < 0) {
        inner.style.transform = `translateX(${Math.max(dx, -72)}px)`;
      }
    }, { passive:true });
    wrap.addEventListener('touchend', () => {
      inner.style.transition = '';
      if (dx < -40) {
        inner.style.transform = 'translateX(-72px)';
        inner._swiped = true;
      } else {
        inner.style.transform = '';
        inner._swiped = false;
      }
    });
    // Open edit on click, but not when swiping
    inner.addEventListener('click', () => {
      if (inner._swiped) { inner.style.transform = ''; inner._swiped = false; return; }
      if (Math.abs(dx) > 5) return; // was dragging
      const eid = Number(inner.dataset.eid);
      if (eid) openEdit(eid);
    });
  });
}

function confirmDelete(id) {
  if (!confirm('Удалить этот расход?')) return;
  deleteExpense(id);
  applyFilters();
}

// ── EDIT MODAL ───────────────────────────────────────────────────
let editRegret = 3;

function openEdit(id) {
  const all = loadExpenses();
  const exp = all.find(e => e.id === id);
  if (!exp) return;

  const config = getBudgetConfig();
  const sel = document.getElementById('editCat');
  sel.innerHTML = '';
  const variable = config.categories.filter(c => !c.fixed);
  const fixed    = config.categories.filter(c => c.fixed);

  const varGrp = document.createElement('optgroup');
  varGrp.label = 'Переменные';
  variable.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.emoji + ' ' + c.name;
    varGrp.appendChild(o);
  });
  sel.appendChild(varGrp);

  if (fixed.length) {
    const fixGrp = document.createElement('optgroup');
    fixGrp.label = 'Фиксированные';
    fixed.forEach(c => {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.emoji + ' ' + c.name;
      fixGrp.appendChild(o);
    });
    sel.appendChild(fixGrp);
  }

  document.getElementById('editId').value     = id;
  document.getElementById('editAmount').value  = exp.amount;
  sel.value                                    = exp.category_id;
  document.getElementById('editDesc').value    = exp.description || '';
  document.getElementById('editDate').value    = exp.date;
  setEditRegret(exp.regret_score);

  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

function setEditRegret(n) {
  editRegret = n;
  document.querySelectorAll('#editRegretRow .modal-regret-btn').forEach(b => {
    b.classList.toggle('sel', Number(b.dataset.s) === n);
  });
}

function modalSave() {
  const id     = Number(document.getElementById('editId').value);
  const amount = Number(document.getElementById('editAmount').value);
  if (!amount || amount <= 0) return;

  updateExpense(id, {
    amount:       amount,
    category_id:  document.getElementById('editCat').value,
    description:  document.getElementById('editDesc').value.trim(),
    date:         document.getElementById('editDate').value,
    regret_score: editRegret,
  });

  closeModal();
  applyFilters();
}

function modalDelete() {
  const id = Number(document.getElementById('editId').value);
  if (!confirm('Удалить этот расход?')) return;
  deleteExpense(id);
  closeModal();
  applyFilters();
}

// ── EXPORT ────────────────────────────────────────────────────────
function doExport() {
  const from = document.getElementById('exportFrom').value || currentFrom;
  const to   = document.getElementById('exportTo').value   || currentTo;
  exportToCSV(from || null, to || null);
}


init();
</script>
</body>
